<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <g stroke="#d4af37" stroke-width="0.5" opacity="0.35">
    <!-- Horizontal traces -->
    <line x1="0" y1="20" x2="80" y2="20"/>
    <line x1="120" y1="20" x2="200" y2="20"/>
    <line x1="0" y1="60" x2="45" y2="60"/>
    <line x1="65" y1="60" x2="140" y2="60"/>
    <line x1="160" y1="60" x2="200" y2="60"/>
    <line x1="0" y1="100" x2="30" y2="100"/>
    <line x1="50" y1="100" x2="110" y2="100"/>
    <line x1="130" y1="100" x2="200" y2="100"/>
    <line x1="0" y1="140" x2="70" y2="140"/>
    <line x1="90" y1="140" x2="155" y2="140"/>
    <line x1="175" y1="140" x2="200" y2="140"/>
    <line x1="0" y1="180" x2="100" y2="180"/>
    <line x1="120" y1="180" x2="200" y2="180"/>

    <!-- Vertical traces -->
    <line x1="20" y1="0" x2="20" y2="60"/>
    <line x1="20" y1="80" x2="20" y2="140"/>
    <line x1="60" y1="0" x2="60" y2="40"/>
    <line x1="60" y1="60" x2="60" y2="100"/>
    <line x1="100" y1="0" x2="100" y2="20"/>
    <line x1="100" y1="40" x2="100" y2="100"/>
    <line x1="100" y1="120" x2="100" y2="180"/>
    <line x1="140" y1="20" x2="140" y2="80"/>
    <line x1="140" y1="100" x2="140" y2="160"/>
    <line x1="180" y1="0" x2="180" y2="60"/>
    <line x1="180" y1="80" x2="180" y2="140"/>
    <line x1="180" y1="160" x2="180" y2="200"/>
    <line x1="40" y1="100" x2="40" y2="200"/>
    <line x1="160" y1="0" x2="160" y2="40"/>
    <line x1="160" y1="60" x2="160" y2="140"/>

    <!-- 90-degree routing bends -->
    <polyline points="80,20 80,60"/>
    <polyline points="120,20 120,60"/>
    <polyline points="45,60 45,100"/>
    <polyline points="65,60 65,20"/>
    <polyline points="30,100 30,140"/>
    <polyline points="50,100 50,60"/>
    <polyline points="110,100 110,140"/>
    <polyline points="130,100 130,60"/>
    <polyline points="70,140 70,180"/>
    <polyline points="90,140 90,100"/>
    <polyline points="155,140 155,180"/>
    <polyline points="175,140 175,100"/>
  </g>

  <!-- Vias (small filled squares at intersections) -->
  <g fill="#d4af37" opacity="0.25">
    <rect x="78" y="18" width="4" height="4"/>
    <rect x="118" y="18" width="4" height="4"/>
    <rect x="43" y="58" width="4" height="4"/>
    <rect x="63" y="58" width="4" height="4"/>
    <rect x="28" y="98" width="4" height="4"/>
    <rect x="48" y="98" width="4" height="4"/>
    <rect x="108" y="98" width="4" height="4"/>
    <rect x="128" y="98" width="4" height="4"/>
    <rect x="68" y="138" width="4" height="4"/>
    <rect x="88" y="138" width="4" height="4"/>
    <rect x="153" y="138" width="4" height="4"/>
    <rect x="173" y="138" width="4" height="4"/>
    <rect x="98" y="178" width="4" height="4"/>
    <rect x="18" y="58" width="4" height="4"/>
    <rect x="58" y="38" width="4" height="4"/>
    <rect x="98" y="38" width="4" height="4"/>
    <rect x="138" y="78" width="4" height="4"/>
    <rect x="178" y="78" width="4" height="4"/>
    <rect x="138" y="158" width="4" height="4"/>
    <rect x="38" y="98" width="4" height="4"/>
    <rect x="158" y="38" width="4" height="4"/>
  </g>
</svg>
