<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <!--
    Two-Stage Miller-Compensated CMOS Op-Amp
    M1/M2 = NMOS diff pair, M3/M4 = PMOS mirror load
    M5 = NMOS tail, M6 = PMOS 2nd stage, M7 = NMOS load
    M8 = NMOS bias, Cc = Miller cap, Rz = nulling R
    
    MOSFET convention:
      NMOS: gate left, channel bar right with 3px gap, 
            drain exits top-right, source exits bottom-right
            Arrow on source line pointing RIGHT (into channel)
      PMOS: same layout but circle on gate line
  -->

  <defs>
    <!-- NMOS symbol: origin at channel center, drain up, source down -->
    <g id="nmos">
      <line x1="-12" y1="0" x2="-4" y2="0" stroke-width="0.7"/><!-- gate input -->
      <line x1="-4" y1="-9" x2="-4" y2="9" stroke-width="0.8"/><!-- gate bar -->
      <line x1="-1" y1="-7" x2="-1" y2="-2" stroke-width="0.9"/><!-- channel top -->
      <line x1="-1" y1="-1" x2="-1" y2="2" stroke-width="0.9"/><!-- channel mid -->
      <line x1="-1" y1="3" x2="-1" y2="7" stroke-width="0.9"/><!-- channel bot -->
      <line x1="-1" y1="-7" x2="6" y2="-7" stroke-width="0.7"/><!-- drain horiz -->
      <line x1="-1" y1="7" x2="6" y2="7" stroke-width="0.7"/><!-- source horiz -->
      <!-- Arrow on source pointing left (into channel) -->
      <polygon points="-1,5 2,7 -1,9" fill="#d4af37" stroke="none" opacity="0.35"/>
    </g>

    <!-- PMOS symbol: same but circle on gate -->
    <g id="pmos">
      <line x1="-12" y1="0" x2="-7" y2="0" stroke-width="0.7"/><!-- gate input -->
      <circle cx="-5.5" cy="0" r="1.5" stroke-width="0.5" fill="none"/><!-- PMOS circle -->
      <line x1="-4" y1="-9" x2="-4" y2="9" stroke-width="0.8"/><!-- gate bar -->
      <line x1="-1" y1="-7" x2="-1" y2="-2" stroke-width="0.9"/><!-- channel top -->
      <line x1="-1" y1="-1" x2="-1" y2="2" stroke-width="0.9"/><!-- channel mid -->
      <line x1="-1" y1="3" x2="-1" y2="7" stroke-width="0.9"/><!-- channel bot -->
      <line x1="-1" y1="-7" x2="6" y2="-7" stroke-width="0.7"/><!-- source horiz (PMOS: source on top) -->
      <line x1="-1" y1="7" x2="6" y2="7" stroke-width="0.7"/><!-- drain horiz -->
    </g>

    <!-- Capacitor symbol: origin at center, terminals top and bottom -->
    <g id="cap">
      <line x1="0" y1="-8" x2="0" y2="-2" stroke-width="0.6"/>
      <line x1="-5" y1="-2" x2="5" y2="-2" stroke-width="0.8"/>
      <line x1="-5" y1="2" x2="5" y2="2" stroke-width="0.8"/>
      <line x1="0" y1="2" x2="0" y2="8" stroke-width="0.6"/>
    </g>

    <!-- Resistor symbol: origin at center, terminals top and bottom -->
    <g id="res">
      <line x1="0" y1="-10" x2="0" y2="-7" stroke-width="0.6"/>
      <polyline points="0,-7 3,-5 -3,-3 3,-1 -3,1 3,3 -3,5 0,7" stroke-width="0.5" fill="none"/>
      <line x1="0" y1="7" x2="0" y2="10" stroke-width="0.6"/>
    </g>

    <!-- Ground symbol -->
    <g id="gnd">
      <line x1="0" y1="0" x2="0" y2="4" stroke-width="0.6"/>
      <line x1="-4" y1="4" x2="4" y2="4" stroke-width="0.6"/>
      <line x1="-2.5" y1="6.5" x2="2.5" y2="6.5" stroke-width="0.5"/>
      <line x1="-1" y1="9" x2="1" y2="9" stroke-width="0.4"/>
    </g>
  </defs>

  <g stroke="#d4af37" opacity="0.32">

    <!-- ══════ VDD RAIL ══════ -->
    <line x1="0" y1="15" x2="400" y2="15" stroke-width="1.8" opacity="0.18"/>

    <!-- ══════ M3 (PMOS, left load) ══════ -->
    <!-- Placed at (100, 55) — source up to VDD, drain down to node A -->
    <use href="#pmos" x="100" y="55"/>
    <!-- M3 source (top, at 106,48) to VDD -->
    <line x1="106" y1="48" x2="106" y2="15" stroke-width="0.6"/>
    <!-- M3 drain (bottom, at 106,62) down to node A at y=80 -->
    <line x1="106" y1="62" x2="106" y2="80" stroke-width="0.6"/>

    <!-- ══════ M4 (PMOS, right load) ══════ -->
    <!-- Placed at (190, 55) -->
    <use href="#pmos" x="190" y="55"/>
    <!-- M4 source (top, at 196,48) to VDD -->
    <line x1="196" y1="48" x2="196" y2="15" stroke-width="0.6"/>
    <!-- M4 drain (bottom, at 196,62) down to node B at y=80 -->
    <line x1="196" y1="62" x2="196" y2="80" stroke-width="0.6"/>

    <!-- M3-M4 current mirror: gates tied together, M3 diode-connected -->
    <!-- M3 gate input at (88,55) → wire down to node A (106,80) -->
    <line x1="88" y1="55" x2="88" y2="80" stroke-width="0.5"/>
    <line x1="88" y1="80" x2="106" y2="80" stroke-width="0.5"/>
    <!-- M4 gate input at (178,55) → wire up, across to M3 gate wire -->
    <line x1="178" y1="55" x2="178" y2="40" stroke-width="0.5"/>
    <line x1="88" y1="40" x2="178" y2="40" stroke-width="0.5"/>
    <line x1="88" y1="40" x2="88" y2="55" stroke-width="0.5"/>

    <!-- ══════ M1 (NMOS, left diff input) ══════ -->
    <!-- Placed at (100, 110) — drain up to node A, source down to tail -->
    <use href="#nmos" x="100" y="110"/>
    <!-- M1 drain (at 106,103) up to node A at y=80 -->
    <line x1="106" y1="103" x2="106" y2="80" stroke-width="0.6"/>
    <!-- M1 source (at 106,117) down to tail node at y=140 -->
    <line x1="106" y1="117" x2="106" y2="140" stroke-width="0.6"/>
    <!-- M1 gate input (at 88,110) ← Vin- signal from left -->
    <line x1="50" y1="110" x2="88" y2="110" stroke-width="0.6"/>

    <!-- ══════ M2 (NMOS, right diff input) ══════ -->
    <!-- Placed at (190, 110) -->
    <use href="#nmos" x="190" y="110"/>
    <!-- M2 drain (at 196,103) up to node B at y=80 -->
    <line x1="196" y1="103" x2="196" y2="80" stroke-width="0.6"/>
    <!-- M2 source (at 196,117) down to tail node at y=140 -->
    <line x1="196" y1="117" x2="196" y2="140" stroke-width="0.6"/>
    <!-- M2 gate input (at 178,110) ← Vin+ signal from right -->
    <line x1="230" y1="110" x2="178" y2="110" stroke-width="0.6"/>

    <!-- Tail node: M1 source + M2 source join at y=140 -->
    <line x1="106" y1="140" x2="150" y2="140" stroke-width="0.6"/>
    <line x1="196" y1="140" x2="150" y2="140" stroke-width="0.6"/>

    <!-- ══════ M5 (NMOS, tail current source) ══════ -->
    <!-- Placed at (144, 165) -->
    <use href="#nmos" x="144" y="165"/>
    <!-- M5 drain (at 150,158) up to tail node at y=140 -->
    <line x1="150" y1="158" x2="150" y2="140" stroke-width="0.6"/>
    <!-- M5 source (at 150,172) down to GND -->
    <line x1="150" y1="172" x2="150" y2="195" stroke-width="0.6"/>
    <use href="#gnd" x="150" y="195"/>

    <!-- ══════ SECOND STAGE ══════ -->

    <!-- ══════ M6 (PMOS, 2nd stage gain) ══════ -->
    <!-- Placed at (280, 65) -->
    <use href="#pmos" x="280" y="65"/>
    <!-- M6 source (top, at 286,58) to VDD -->
    <line x1="286" y1="58" x2="286" y2="15" stroke-width="0.6"/>
    <!-- M6 drain (bottom, at 286,72) down to output node y=100 -->
    <line x1="286" y1="72" x2="286" y2="100" stroke-width="0.6"/>
    <!-- M6 gate (at 268,65) driven from node B -->
    <line x1="196" y1="80" x2="240" y2="80" stroke-width="0.5"/>
    <line x1="240" y1="80" x2="240" y2="65" stroke-width="0.5"/>
    <line x1="240" y1="65" x2="268" y2="65" stroke-width="0.5"/>

    <!-- ══════ M7 (NMOS, 2nd stage load) ══════ -->
    <!-- Placed at (280, 135) -->
    <use href="#nmos" x="280" y="135"/>
    <!-- M7 drain (at 286,128) up to output node y=100 -->
    <line x1="286" y1="128" x2="286" y2="100" stroke-width="0.6"/>
    <!-- M7 source (at 286,142) down to GND -->
    <line x1="286" y1="142" x2="286" y2="165" stroke-width="0.6"/>
    <use href="#gnd" x="286" y="165"/>

    <!-- Output node → Vout line -->
    <line x1="286" y1="100" x2="330" y2="100" stroke-width="0.6"/>

    <!-- ══════ MILLER COMPENSATION (Rz + Cc) ══════ -->
    <!-- Rz from node B (y=80) going down -->
    <line x1="220" y1="80" x2="220" y2="90" stroke-width="0.5"/>
    <use href="#res" x="220" y="100"/>
    <!-- Cc below resistor -->
    <use href="#cap" x="220" y="120"/>
    <!-- Bottom of Cc to output node -->
    <line x1="220" y1="128" x2="220" y2="140" stroke-width="0.5"/>
    <line x1="220" y1="140" x2="310" y2="140" stroke-width="0.5"/>
    <line x1="310" y1="140" x2="310" y2="100" stroke-width="0.5"/>

    <!-- ══════ BIAS CIRCUIT (M8) ══════ -->
    <!-- M8 (NMOS, diode-connected bias) at (350, 220) -->
    <use href="#nmos" x="350" y="220"/>
    <!-- M8 drain (at 356,213) up -->
    <line x1="356" y1="213" x2="356" y2="190" stroke-width="0.6"/>
    <!-- Rbias above M8 to VDD -->
    <use href="#res" x="356" y="180"/>
    <line x1="356" y1="170" x2="356" y2="15" stroke-width="0.6"/>
    <!-- M8 source (at 356,227) to GND -->
    <line x1="356" y1="227" x2="356" y2="250" stroke-width="0.6"/>
    <use href="#gnd" x="356" y="250"/>
    <!-- M8 diode: gate (338,220) ties to drain (356,190) -->
    <line x1="338" y1="220" x2="338" y2="190" stroke-width="0.5"/>
    <line x1="338" y1="190" x2="356" y2="190" stroke-width="0.5"/>

    <!-- Bias mirror bus: M8 gate → M5 gate + M7 gate -->
    <line x1="338" y1="220" x2="338" y2="260" stroke-width="0.4"/>
    <line x1="132" y1="260" x2="338" y2="260" stroke-width="0.4"/>
    <!-- Up to M5 gate -->
    <line x1="132" y1="165" x2="132" y2="260" stroke-width="0.4"/>
    <!-- Up to M7 gate -->
    <line x1="268" y1="135" x2="268" y2="260" stroke-width="0.4"/>

    <!-- ══════ OUTPUT LOAD (CL) ══════ -->
    <line x1="330" y1="100" x2="350" y2="100" stroke-width="0.5"/>
    <line x1="350" y1="100" x2="350" y2="112" stroke-width="0.5"/>
    <use href="#cap" x="350" y="120"/>
    <line x1="350" y1="128" x2="350" y2="140" stroke-width="0.5"/>
    <use href="#gnd" x="350" y="140"/>

    <!-- ══════ VDD SUPPLY DECOUPLING ══════ -->
    <line x1="35" y1="15" x2="35" y2="26" stroke-width="0.5"/>
    <use href="#cap" x="35" y="34"/>
    <line x1="35" y1="42" x2="35" y2="50" stroke-width="0.5"/>
    <use href="#gnd" x="35" y="50"/>

    <!-- ══════ INPUT SIGNAL LINES ══════ -->
    <line x1="15" y1="110" x2="50" y2="110" stroke-width="0.5"/>
    <line x1="230" y1="110" x2="260" y2="110" stroke-width="0.5"/>

  </g>

  <!-- ══════ JUNCTION DOTS ══════ -->
  <g fill="#d4af37" opacity="0.25">
    <circle cx="106" cy="80" r="1.5"/><!-- node A -->
    <circle cx="196" cy="80" r="1.5"/><!-- node B -->
    <circle cx="150" cy="140" r="1.5"/><!-- tail -->
    <circle cx="286" cy="100" r="1.5"/><!-- output -->
    <circle cx="220" cy="80" r="1.5"/><!-- Rz tap from node B -->
    <circle cx="310" cy="100" r="1.5"/><!-- Cc to output -->
    <circle cx="330" cy="100" r="1.5"/><!-- CL tap -->
    <circle cx="338" cy="220" r="1.5"/><!-- M8 gate/diode -->
    <circle cx="338" cy="190" r="1.5"/><!-- M8 diode junction -->
    <circle cx="356" cy="190" r="1.5"/><!-- M8 drain -->
    <circle cx="132" cy="260" r="1.5"/><!-- bias bus to M5 -->
    <circle cx="268" cy="260" r="1.5"/><!-- bias bus to M7 -->
    <circle cx="338" cy="260" r="1.5"/><!-- bias bus from M8 -->
    <circle cx="88" cy="55" r="1.5"/><!-- M3 gate -->
    <circle cx="88" cy="40" r="1.5"/><!-- mirror top -->
  </g>
</svg>
